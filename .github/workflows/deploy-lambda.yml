name: Deploy Lambda API

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  API_PROJECT: backend/src/Api/Api.csproj
  PUBLISH_DIR: artifacts/api-publish
  ZIP_PATH: artifacts/api-lambda.zip
  LAMBDA_FUNCTION_NAME: bitly-clone-dev-api

jobs:
  deploy:
    name: Build, Package, and Deploy Lambda Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore backend/Backend.sln

      - name: Build
        run: dotnet build backend/Backend.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Backend.sln --configuration Release --no-build

      - name: Publish Lambda package
        run: |
          rm -rf "$PUBLISH_DIR" "$ZIP_PATH"
          mkdir -p "$PUBLISH_DIR" "$(dirname "$ZIP_PATH")"
          dotnet publish "$API_PROJECT" \
            --configuration Release \
            --framework net8.0 \
            --runtime linux-arm64 \
            --self-contained false \
            --output "$PUBLISH_DIR"
          cd "$PUBLISH_DIR"
          zip -r "../api-lambda.zip" .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-url-shortener-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda configuration
        run: |
          jq -n \
            --arg environment "dev" \
            --arg database "${{ secrets.NEON_DATABASE_URL }}" \
            --arg redis "${{ secrets.REDIS_CONNECTION_STRING }}" \
            '{Variables:{ASPNETCORE_ENVIRONMENT:$environment,ConnectionStrings__Default:$database,Redis__ConnectionString:$redis}}' \
            > lambda-env.json

          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --environment file://lambda-env.json

          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION"

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --zip-file "fileb://$ZIP_PATH"

          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION"
